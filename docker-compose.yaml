version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - 5432:5432
    volumes:
      - data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=balisong_db
      - POSTGRES_USER=balisong_user
      - POSTGRES_PASSWORD=balisong_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balisong_user -d balisong_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    # image: 343218221384.dkr.ecr.us-east-1.amazonaws.com/balisongflippingcenter/backend/main:latest
    build: .
    container_name: server
    ports:
      - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  data: {}
