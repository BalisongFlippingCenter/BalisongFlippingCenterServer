# BASE CONFIG
spring.application.name=BalisongFlipping
spring.profiles.active=default

# POSTGRES CONFIG
spring.datasource.url=jdbc:postgresql://postgres:5432/balisong_db
spring.datasource.username=balisong_user
spring.datasource.password=balisong_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE CONFIG
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# FLYWAY CONFIG
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#JWT TOKEN CONFIG
security.jwt.secret-key=${JWT_SECRET_KEY}
# - Expiration time 1 hr
security.jwt.expiration-time=3600000

#AWS S3 Configuration
aws.s3.region=us-east-1
aws.s3.access-key=${AWS_ACCESS_KEY}
aws.s3.secret-key=${AWS_SECRET_KEY}
cloud.aws.s3.bucket=${AWS_S3_BUCKET}

#REST API CONFIG
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=500MB
management.endpoints.web.exposure.include: *

# Spring Email Sender Config
management.health.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
